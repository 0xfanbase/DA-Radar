name: Watcher

on:
  schedule:
    - cron: "30 1 * * *" # 09:30 HKT (UTC+8, no DST) daily
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: watch-hk-radar
  cancel-in-progress: false

jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e .

      - name: Run watcher
        run: |
          python -m pipeline.watcher.run \
            --config config/jurisdiction.json \
            --ledger data/ledger.json \
            --queue data/queue.json \
            --cache-dir data/cache

      - name: Check for ledger/queue changes
        id: changes
        run: |
          if git diff --quiet -- data/ledger.json data/queue.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit ledger/queue updates
        if: steps.changes.outputs.changed == 'true'
        env:
          GIT_AUTHOR_NAME: hk-radar-bot
          GIT_AUTHOR_EMAIL: bot@users.noreply.github.com
          GIT_COMMITTER_NAME: hk-radar-bot
          GIT_COMMITTER_EMAIL: bot@users.noreply.github.com
        run: |
          git add data/ledger.json data/queue.json
          git commit -m "watch: $(date -u +%Y-%m-%dT%H:%M:%SZ) update ledger/queue"
          git push

      - name: Trigger analyze.yml
        if: steps.changes.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -sS -f -X POST \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/dispatches" \
            -d '{"event_type":"queue-updated"}'
          echo "Dispatched queue-updated to analyze.yml."
