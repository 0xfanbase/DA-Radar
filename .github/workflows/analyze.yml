# Spec-literal analyst/verifier pipeline via anthropics/claude-code-action@v1.
# DORMANT in this deployment: no CLAUDE_CODE_OAUTH_TOKEN/ANTHROPIC_API_KEY
# secret is provisioned (a deliberate owner decision, not an oversight --
# see IMPROVEMENT_BACKLOG.md). The check-queue job's credential check makes
# the analyst/verifier jobs skip cleanly rather than fail. The operative
# analyst/verifier mechanism in this deployment is a scheduled Claude Code
# Remote session (see docs/analyst-runbook.md), not this workflow. If a
# future owner adds either secret, this workflow starts working exactly as
# the original spec describes, with no other change needed.
name: Analyze

on:
  repository_dispatch:
    types: [queue-updated]
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: analyze-hk-radar
  cancel-in-progress: false

env:
  CLAUDE_ARGS: >-
    --max-turns 30 --disallowedTools "Bash" --allowedTools "Read" "WebFetch"
    "Write(content/**)" "Edit(content/**)"

jobs:
  check-queue:
    runs-on: ubuntu-latest
    outputs:
      empty: ${{ steps.check.outputs.empty }}
      credentials_available: ${{ steps.creds.outputs.available }}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e .

      # CLAUDE.md quota rule: exit immediately (no AI job spun up at all)
      # if data/queue.json is empty -- no run, no cost.
      - name: Check queue
        id: check
        run: python -m pipeline.ci.queue_check --queue data/queue.json

      # This deployment deliberately does not provision an AI credential
      # here (see IMPROVEMENT_BACKLOG.md) -- the analyst/verifier jobs
      # below must skip cleanly rather than fail noisily when neither
      # secret exists, so this workflow stays dormant-but-harmless rather
      # than a source of daily failure notifications.
      - name: Check AI credentials
        id: creds
        env:
          HAS_OAUTH: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          HAS_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -n "$HAS_OAUTH" ] || [ -n "$HAS_API_KEY" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No CLAUDE_CODE_OAUTH_TOKEN or ANTHROPIC_API_KEY secret is configured. Skipping the analyst/verifier jobs -- this deployment intentionally has no such secret (see IMPROVEMENT_BACKLOG.md); the analyst/verifier role instead runs via a scheduled Claude Code Remote session. This workflow remains a dormant, spec-literal fallback that would activate automatically if a future owner adds one of the two secrets."
          fi

  analyst:
    needs: check-queue
    if: needs.check-queue.outputs.empty != 'true' && needs.check-queue.outputs.credentials_available == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Run analyst
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            Read pipeline/prompts/analyst_prompt.md in full and follow its instructions exactly.
          claude_args: ${{ env.CLAUDE_ARGS }}
          display_report: true

      - name: Set up Python
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e .

      # Layer 2 of 2 (layer 1 is the AI job's own restricted claude_args):
      # deterministic, non-bypassable checks that never trust what the AI
      # job's own tool permissions claim to have enforced.
      - name: Path-allowlist gate
        run: python -m pipeline.ci.path_allowlist --mode working-tree

      - name: Schema-validation gate
        run: python -m pipeline.ci.validate_content

      # Deterministic code, not the AI job, owns every ledger mutation.
      - name: Promote drafted ledger items
        run: python -m pipeline.ci.promote_drafted

      - name: Commit draft card(s)
        env:
          GIT_AUTHOR_NAME: hk-radar-bot
          GIT_AUTHOR_EMAIL: bot@users.noreply.github.com
          GIT_COMMITTER_NAME: hk-radar-bot
          GIT_COMMITTER_EMAIL: bot@users.noreply.github.com
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "No changes to commit."
            exit 0
          fi
          git add content/ data/ledger.json data/queue.json
          git commit -m "analyst: draft card(s) for queued item(s)"
          git push
          curl -sS -f -X POST \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/dispatches" \
            -d '{"event_type":"site-rebuild-needed"}'
          echo "Dispatched site-rebuild-needed to deploy.yml."

  verifier:
    needs: analyst
    runs-on: ubuntu-latest
    steps:
      # fetch-depth 2 so HEAD~1 (the state before the analyst's commit) is
      # available locally, to compute exactly which card(s) it just wrote.
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 2

      - name: Determine which card(s) the analyst just drafted
        id: scope
        run: |
          {
            echo "files<<EOF"
            git diff --name-only HEAD~1 HEAD -- content/cards/
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Run verifier
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            Read pipeline/prompts/verifier_prompt.md in full and follow its instructions exactly.

            The card file(s) to review, drafted by the analyst in the most recent commit, are:
            ${{ steps.scope.outputs.files }}
          claude_args: ${{ env.CLAUDE_ARGS }}
          display_report: true

      - name: Set up Python
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e .

      - name: Path-allowlist gate
        run: python -m pipeline.ci.path_allowlist --mode working-tree

      - name: Schema-validation gate
        run: python -m pipeline.ci.validate_content

      # The actual non-bypassable check: re-fetches every citation for
      # real and forces status="unverified" on any failure, regardless of
      # what the verifier LLM pass claimed.
      - name: Verification gate
        run: python -m pipeline.ci.apply_verification_gate

      - name: Promote verified/published ledger items
        run: python -m pipeline.ci.promote_verified

      - name: Commit verified card(s)
        env:
          GIT_AUTHOR_NAME: hk-radar-bot
          GIT_AUTHOR_EMAIL: bot@users.noreply.github.com
          GIT_COMMITTER_NAME: hk-radar-bot
          GIT_COMMITTER_EMAIL: bot@users.noreply.github.com
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "No changes to commit."
            exit 0
          fi
          git add content/ data/ledger.json data/queue.json
          git commit -m "verifier: verify/correct card(s)"
          git push
          curl -sS -f -X POST \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/dispatches" \
            -d '{"event_type":"site-rebuild-needed"}'
          echo "Dispatched site-rebuild-needed to deploy.yml."
